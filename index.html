<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temporal Focus | Premium Productivity Timer</title>
    <meta name="description" content="A premium smart timer for deep work and focus. Elegant glassmorphism design with intuitive Pomodoro features.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-focus">
    <div class="background-canvas"></div>
    <div class="noise-overlay"></div>
    
    <nav class="top-nav">
        <button id="back-btn" class="btn-icon hidden" aria-label="Back">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <div class="session-info">
            <span id="session-type">Focus Session</span>
        </div>
        <button id="stats-btn" class="btn-icon" aria-label="Statistics">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
        </button>
    </nav>

    <main class="container">
        <!-- View 1: Main Timer -->
        <section id="view-timer" class="view active">
            <header class="header">
                <h1 class="logo">TEMPORAL FOCUS</h1>
                <p class="subtitle">PRECISION PRODUCTIVITY</p>
            </header>

            <div class="timer-section">
                <div class="glass-card timer-container">
                    <svg class="progress-ring" width="300" height="300">
                        <circle class="progress-ring__circle-bg" stroke="rgba(255,255,255,0.05)" stroke-width="6" fill="transparent" r="142" cx="150" cy="150"/>
                        <circle class="progress-ring__circle" id="progress-circle" stroke="var(--accent-color)" stroke-width="8" fill="transparent" r="142" cx="150" cy="150"/>
                    </svg>
                    <div class="timer-display" id="timer-display">
                        <span id="display-min">25</span>:<span id="display-sec">00</span>
                    </div>
                </div>
            </div>

            <div class="presets">
                <button class="btn-preset" data-time="15">Quick Task</button>
                <button class="btn-preset active" data-time="25">Focus</button>
                <button class="btn-preset" data-time="25">Study</button>
                <button class="btn-preset" data-time="50">Deep Work</button>
                <button class="btn-preset" data-time="5">Short Break</button>
                <button class="btn-preset" data-time="15">Long Break</button>
            </div>

            <footer class="controls-main">
                <button class="btn-action" id="reset-btn">RESET</button>
                <button class="btn-primary-large" id="start-btn">START</button>
                <button class="btn-action" id="settings-btn">SETTINGS</button>
            </footer>
        </section>

        <!-- View 2: Settings -->
        <section id="view-settings" class="view">
            <div class="glass-card settings-panel">
                <h2>Custom Duration</h2>
                <div class="input-group">
                    <label for="custom-min">Minutes (1-999)</label>
                    <input type="number" id="custom-min" placeholder="25" min="1" max="999">
                </div>
                <div class="settings-actions">
                    <button class="btn-primary" id="save-time">Apply Changes</button>
                </div>
            </div>
        </section>

        <!-- View 3: Statistics -->
        <section id="view-stats" class="view">
            <div class="glass-card stats-panel">
                <h2>Activity Overview</h2>
                <div class="stats-grid">
                    <div class="stat-item">
                        <span class="stat-value" id="stats-count">0</span>
                        <span class="stat-label">Sessions</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="stats-time">0</span>
                        <span class="stat-label">Minutes</span>
                    </div>
                </div>
                <div class="stats-actions">
                    <button class="btn-action" id="clear-stats">Reset Daily Progress</button>
                </div>
            </div>
        </section>

        <!-- Ad Placeholder -->
        <div class="ad-container-bottom">
            <div class="ad-placeholder">
                <span class="ad-label">Advertisement</span>
                <!-- AdSense code will go here -->
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
